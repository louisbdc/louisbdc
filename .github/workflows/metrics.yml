name: GitHub Metrics

on:
  # Manual trigger (run this AFTER adding the METRICS_TOKEN secret)
  workflow_dispatch:
  # Rebuild every 12 hours
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          # Personal access token — add it as a repo secret named METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: louisbdc
          filename: github-metrics.svg
          template: classic
          config_timezone: Europe/Paris

          # Core sections
          base: header, activity, repositories, metadata

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Stylish full-year activity calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
